services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: vp-esr-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:?NODE_ENV is required}
      - PORT=${BACKEND_PORT:?BACKEND_PORT is required}
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - AUTH_SERVER_URL=${AUTH_SERVER_URL:?AUTH_SERVER_URL is required}
      - TZ=Asia/Kolkata
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:?BACKEND_PORT is required}:${BACKEND_PORT:?BACKEND_PORT is required}"
    networks:
      - app-network
    volumes:
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_APP_API_PREFIX=${VITE_APP_API_PREFIX:?VITE_APP_API_PREFIX is required}
        - VITE_ADMIN_LOGIN_URL=${VITE_ADMIN_LOGIN_URL:?VITE_ADMIN_LOGIN_URL is required}
    container_name: vp-esr-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:?NODE_ENV is required}
      - FRONTEND_PORT=${FRONTEND_PORT:?FRONTEND_PORT is required}
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT:?FRONTEND_PORT is required}:${FRONTEND_PORT:?FRONTEND_PORT is required}"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const p=process.env.FRONTEND_PORT; if(!p){process.exit(1)} fetch('http://localhost:'+p+'/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
    name: vp-esr-network

volumes:
  backend-logs:
    driver: local
